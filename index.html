<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehiko</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang-bar">
    <button onclick="setLang('et')">EST</button>
    <button onclick="setLang('ru')">РУС</button>
</div>

<header class="compact-hero">
    <div class="container">
        <h1 class="logo" onclick="scrollToTop()">EHI<span>KO</span></h1>
    </div>
</header>

<nav class="filter-sticky">
    <div class="container">
        <div class="nav-top-row">
            <div class="search-wrapper">
                <input type="text" id="searchInput" 
                       data-et="Otsi firma nime järgi..." 
                       data-ru="Поиск по названию..." 
                       placeholder="Otsi firma nime järgi..."
                       oninput="handleSearch(this.value)">
            </div>
            <button class="add-firm-btn main-blue-btn" onclick="openPostFirmModal()" data-et="+ Postita" data-ru="+ Разместить">+ Postita</button>
        </div>

        <div class="nav-categories-grid">
            <button class="filter-btn active" onclick="filterCat('all', this)" data-et="Kõik" data-ru="Все">Kõik</button>
            <button class="filter-btn" onclick="filterCat('construction', this)" data-et="Ehitus" data-ru="Строительство">Ehitus</button>
            <button class="filter-btn" onclick="filterCat('renovation', this)" data-et="Renoveerimine" data-ru="Ремонт">Renoveerimine</button>
            <button class="filter-btn" onclick="filterCat('electrical', this)" data-et="Elektritööd" data-ru="Электрика">Elektritööd</button>
            <button class="filter-btn" onclick="filterCat('plumbing', this)" data-et="Torustik" data-ru="Сантехника">Torustik</button>
            <button class="filter-btn" onclick="filterCat('roofing', this)" data-et="Katused" data-ru="Кровля">Katused</button>
            <button class="filter-btn" onclick="filterCat('flooring', this)" data-et="Põrandad" data-ru="Полы">Põrandad</button>
            <button class="filter-btn" onclick="filterCat('painting', this)" data-et="Värvimine" data-ru="Покраска">Värvimine</button>
            <button class="filter-btn" onclick="filterCat('carpentry', this)" data-et="Puusepatööd" data-ru="Плотницкие работы">Puusepatööd</button>
            <button class="filter-btn" onclick="filterCat('masonry', this)" data-et="Müüritööd" data-ru="Каменные работы">Müüritööd</button>
            <button class="filter-btn" onclick="filterCat('insulation', this)" data-et="Soojustus" data-ru="Утепление">Soojustus</button>
            <button class="filter-btn" onclick="filterCat('windows', this)" data-et="Aknad" data-ru="Окна и двери">Aknad</button>
            <button class="filter-btn" onclick="filterCat('landscaping', this)" data-et="Haljastus" data-ru="Ландшафт">Haljastus</button>
            <button class="filter-btn" onclick="filterCat('cleaning', this)" data-et="Koristus" data-ru="Уборка">Koristus</button>
            <button class="filter-btn" onclick="filterCat('demolition', this)" data-et="Lammutus" data-ru="Демонтаж">Lammutus</button>
            
            <select id="cityFilter" onchange="filterCity(this.value)" class="city-select-nav">
                <option value="all" data-et="Kõik linnad" data-ru="Все города">Kõik linnad</option>
                <option value="tallinn">Tallinn</option>
                <option value="tartu">Tartu</option>
                <option value="narva">Narva</option>
                <option value="parnu">Pärnu</option>
                <option value="kohtla-jarve">Kohtla-Järve</option>
                <option value="muu" data-et="Muu" data-ru="Другое">Muu</option>
            </select>
        </div>
    </div>
</nav>

<main class="container listing-area">
    <div id="main-grid"></div>
    <div id="loader-sentinel"></div>
</main>

<div id="postFirmModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 data-et="Minu Profiil" data-ru="Мой профиль">Minu Profiil</h2>
            <button class="close-btn" onclick="closePostFirmModal()">×</button>
        </div>

        <div id="authStep" class="modal-step">
            <p data-et="Logi sisse või registreeru" data-ru="Войти или зарегистрироваться">Logi sisse või registreeru:</p>
            <div class="form-group">
                <label for="userEmail">Email</label>
                <input type="email" id="userEmail" placeholder="your@email.com" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="userPassword" data-et="Salasõna (min 6 tähte)" data-ru="Пароль (мин. 6 символов)">Salasõna (min 6 tähte)</label>
                <input type="password" id="userPassword" placeholder="******" class="form-input" required>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="loginUser()" class="submit-btn" style="flex: 1;" data-et="Logi sisse" data-ru="Войти">Logi sisse</button>
                <button onclick="registerUser()" class="submit-btn" style="flex: 1; background: #34495e;" data-et="Registreeru" data-ru="Регистрация">Registreeru</button>
            </div>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" onclick="forgotPassword(); return false;" style="color: #666; font-size: 0.85rem; text-decoration: underline;" data-et="Unustasid parooli?" data-ru="Забыли пароль?">Unustasid parooli?</a>
            </div>
        </div>

        <div id="userFirmsStep" class="modal-step hidden">
            <div id="userFirmsList" class="user-firms-list"></div>
        </div>

        <div id="firmStep" class="modal-step hidden">
            <form id="firmForm">
                <div class="form-group">
                    <label for="firmName" data-et="Firma nimi" data-ru="Название компании">Firma nimi</label>
                    <input type="text" id="firmName" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="firmCategory" data-et="Kategooria" data-ru="Категория">Kategooria</label>
                    <select id="firmCategory" required class="form-input">
                       <option value="" data-et="Vali kategooria" data-ru="Выбрать категорию">Vali kategooria</option>
                       <option value="construction" data-et="Ehitus" data-ru="Строительство">Ehitus</option>
                       <option value="renovation" data-et="Renoveerimine" data-ru="Ремонт">Renoveerimine</option>
                       <option value="electrical" data-et="Elektritööd" data-ru="Электрика">Elektritööd</option>
                       <option value="plumbing" data-et="Torustik" data-ru="Сантехника">Torustik</option>
                       <option value="roofing" data-et="Katused" data-ru="Кровля">Katused</option>
                       <option value="flooring" data-et="Põrandad" data-ru="Полы">Põrandad</option>
                       <option value="painting" data-et="Värvimine" data-ru="Покраска">Värvimine</option>
                       <option value="carpentry" data-et="Puusepatööd" data-ru="Плотницкие работы">Puusepatööd</option>
                       <option value="masonry" data-et="Müüritööd" data-ru="Каменные работы">Müüritööd</option>
                       <option value="insulation" data-et="Soojustus" data-ru="Утепление">Soojustus</option>
                       <option value="windows" data-et="Aknad" data-ru="Окна и двери">Aknad</option>
                       <option value="landscaping" data-et="Haljastus" data-ru="Ландшафт">Haljastus</option>
                       <option value="cleaning" data-et="Koristus" data-ru="Уборка">Koristus</option>
                       <option value="demolition" data-et="Lammutus" data-ru="Демонтаж">Lammutus</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="firmCity" data-et="Linn" data-ru="Город">Linn</label>
                    <select id="firmCity" required class="form-input">
                        <option value="" disabled selected data-et="Vali linn" data-ru="Выберите город">Vali linn</option>
                        <option value="tallinn">Tallinn</option>
                        <option value="tartu">Tartu</option>
                        <option value="narva">Narva</option>
                        <option value="parnu">Pärnu</option>
                        <option value="kohtla-jarve">Kohtla-Järve</option>
                        <option value="muu" data-et="Muu" data-ru="Другое">Muu</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="firmPhone" data-et="Telefon" data-ru="Телефон">Telefon</label>
                    <input type="tel" id="firmPhone" placeholder="555 0000" required class="form-input">
                </div>
                <div class="form-group">
                    <label for="firmWebsite" data-et="Veebisait" data-ru="Веб-сайт">Veebisait</label>
                    <input type="url" id="firmWebsite" placeholder="https://..." class="form-input">
                </div>
                <div class="form-group">
                    <label for="firmExperience" data-et="Kogemuse aastad" data-ru="Лет опыта">Kogemuse aastad</label>
                    <input type="number" id="firmExperience" min="0" required class="form-input">
                </div>
                <div class="form-group">
                    <label data-et="Firma logo" data-ru="Логотип">Firma logo</label>
                    <input type="file" id="logoFile" accept="image/*" class="form-input">
                    <div id="logoPreview" class="hidden" style="margin-top:10px; text-align:center;">
                        <img id="logoPreviewImg" src="" alt="Preview" style="max-height:80px; border-radius:4px;">
                    </div>
                </div>
                <button type="button" onclick="submitFirm()" class="submit-btn" data-et="Salvesta" data-ru="Сохранить">Salvesta</button>
                <button type="button" onclick="showUserFirmsStep()" class="back-btn" style="background:#95a5a6; margin-top:8px; width:100%; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer;" data-et="Tühista" data-ru="Отмена">Tühista</button>
            </form>
        </div>

        <div id="successStep" class="modal-step hidden">
            <div style="text-align: center; padding: 20px;">
                <h3 data-et="Tehtud!" data-ru="Готово!">Tehtud!</h3>
                <p data-et="Andmed on salvestatud." data-ru="Данные сохранены.">Andmed on salvestatud.</p>
                <button onclick="closePostFirmModal()" class="submit-btn" data-et="Sulge" data-ru="Закрыть">Sulge</button>
            </div>
        </div>
    </div>
</div>

<div id="premiumModal" class="modal">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <div class="modal-header" style="justify-content: center;">
            <h2 data-et="Telli Premium ⭐" data-ru="Заказать Premium ⭐" style="color: #d4af37;">Telli Premium ⭐</h2>
            <button class="close-btn" onclick="closePremiumModal()">×</button>
        </div>
        <div style="padding: 20px;">
            <p data-et="Premium kuulutus on alati eespool." data-ru="Премиум-объявление всегда наверху.">Premium kuulutus on alati eespool.</p>
            <h3 style="font-size: 1.8rem; margin: 15px 0;">9.99€ / kuu</h3>
            <a href="mailto:info@ehitusturg.ee" style="text-decoration: none; font-weight: bold; color: #007bff;">info@ehitusturg.ee</a>
        </div>
        <button onclick="closePremiumModal()" class="submit-btn" style="background: #95a5a6;" data-et="Sulge" data-ru="Закрыть">Sulge</button>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closePostFirmModal()"></div>
<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>
<script src="script.js"></script>

</body>
</html>
